[project]
site_name = "Deavon's Dotfiles"
site_description = "macOS terminal environment: ghostty, zsh, tmux, LazyVim, cyberdream"
site_author = "Deavon McCaffery"
site_url = "https://dmccaffery.github.io/dotfiles/"
repo_url = "https://github.com/dmccaffery/dotfiles"
repo_name = "dmccaffery/dotfiles"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; 2026 Deavon McCaffery"

extra_css = ["assets/extras.css"]

nav = [
    { "Home" = "index.md" },
    { "Getting Started" = [
        "getting-started/index.md",
        "getting-started/install.md",
        "getting-started/backup.md",
        "getting-started/customize.md",
    ] },
    { "Terminal" = [
        "terminal/index.md",
        "terminal/ghostty.md",
        "terminal/shell.md",
        "terminal/oh-my-posh.md",
        "terminal/tmux.md",
        "terminal/packages.md",
        "terminal/brew-bundle.md",
    ] },
    { "NeoVim" = [
        "neovim/index.md",
        "neovim/lazyvim.md",
        "neovim/extras.md",
        "neovim/plugins.md",
        "neovim/autocmds-keymaps.md",
    ] },
    { "Theme" = [
        "theme/index.md",
        "theme/cyberdream.md",
        "theme/per-tool.md",
        "theme/wallpapers.md",
    ] },
    { "Git" = [
        "git/index.md",
        "git/config.md",
        "git/git-town.md",
        "git/auth.md",
        "git/signing-security-keys.md",
        "git/private-extension.md",
    ] },
    { "Scripts" = [
        "scripts/index.md",
        "scripts/tmux.md",
        "scripts/security-keys.md",
        "scripts/zscaler.md",
        "scripts/misc.md",
    ] },
    { "macOS" = [
        "macos/index.md",
        "macos/system-defaults.md",
        "macos/launchagents.md",
    ] },
    { "Claude Code" = [
        "claude/index.md",
        "claude/settings.md",
        "claude/theme.md",
        "claude/hooks-skills.md",
    ] },
    { "Contribution Guide" = [
        "tooling/index.md",
        "tooling/stow-and-make.md",
        "tooling/release-please.md",
        "tooling/linting.md",
        "tooling/contributing.md",
    ] },
]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]
