# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 4
final_space: true
streaming: 100

palette:
  base: "#16181A"
  blue: "#5EA1FF"
  crust: "#1E2124"
  diff_add: "#24462A"
  diff_rem: "#442927"
  flamingo: "#FFACF6"
  green: "#5EFF6C"
  lavender: "#BD5EFF"
  mantle: "#1E2124"
  maroon: "#A12400"
  mauve: "#FF5EA0"
  overlay_0: "#3C4048"
  overlay_1: "#3C4048"
  overlay_2: "#1E2124"
  peach: "#FFBD5E"
  pink: "#FF5EF1"
  red: "#FF6E5E"
  rosewater: "#FFEAFC"
  sapphire: "#007CDE"
  sky: "#ABC7FF"
  subtext_0: "#7B8496"
  subtext_1: "#7B8496"
  surface_0: "#3C4048"
  surface_1: "#1E2124"
  surface_2: "#1E2124"
  teal: "#5EF1FF"
  text: "#FFFFFF"
  yellow: "#F1FF5E"

secondary_prompt:
  template: "вқҜвқҜ "
  foreground: p:red
  background: transparent

transient_prompt:
  template: "вқҜ "
  background: transparent
  foreground_templates:
    - "{{if gt .Code 0}}p:red{{end}}"
    - "{{if eq .Code 0}}p:subtext_1{{end}}"

upgrade:
  source: cdn
  interval: 168h
  auto: false
  notice: false

blocks:
  - type: prompt
    alignment: left
    segments:
      - type: os
        template: "{{ .Icon }} "
        foreground: p:crust
        background: p:blue
        style: diamond
        leading_diamond: в•ӯв”ҖоӮ¶
        trailing_diamond: оӮ°

      - type: path
        template: " пҒ»оӘң {{ .Path }} "
        foreground: p:crust
        background: p:pink
        style: diamond
        leading_diamond: <p:crust>оӮ°</>
        trailing_diamond: оӮ°
        cache:
          duration: none
        options:
          folder_icon: " пҒ» "
          home_icon: оҳ—
          style: folder

      - type: git
        template: " {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} пҒ„ {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} пҒҶ {{ .Staging.String }}{{ end }} "
        foreground: p:crust
        background: p:green
        style: diamond
        leading_diamond: <p:crust>оӮ°</>
        trailing_diamond: оӮ°
        cache:
          duration: none
        options:
          branch_icon: "оңҘ "
          cherry_pick_icon: "оҠӣ "
          commit_icon: "пҗ— "
          fetch_status: true
          fetch_upstream_icon: false
          merge_icon: "оң§ "
          no_commits_icon: "пғғ "
          rebase_icon: "оңЁ "
          revert_icon: "пғў "
          tag_icon: "пҗ’ "

  - type: prompt
    alignment: right
    segments:
      - type: go
        style: diamond
        leading_diamond: оӮІ
        foreground: p:crust
        background: p:sky
        template: "оҷһ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
        options:
          extensions:
            - go.mod
            - go.work
        cache:
          duration: none

      - type: lua
        style: diamond
        leading_diamond: оӮІ
        foreground: p:crust
        background: p:blue
        template: " оҳ   {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "

      - type: python
        style: diamond
        leading_diamond: оӮІ
        foreground: p:crust
        background: p:yellow
        template: " оҲө  {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }} "
        options:
          tooling:
            - uv

      - type: node
        style: diamond
        leading_diamond: оӮІ
        foreground: p:crust
        background: p:red
        cache:
          duration: none
        options:
          extensions:
            - package.json
          fetch_package_manager: true
          npm_icon: "оңһ "
          yarn_icon: "оҡ§ "
          pnpm_icon: "оЎҘ "

      - type: gcp
        style: diamond
        leading_diamond: оӮІ
        trailing_diamond: оӮҙ
        foreground: p:crust
        background: "#4285F4"
        template: " оһІ {{.Project}} "
        cache:
          duration: none

  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: text
        style: plain
        foreground: p:blue
        background: transparent
        template: в•°в”Җ
        cache:
          duration: none

      - type: status
        style: plain
        foreground: p:subtext_1
        background: transparent
        template: "оҠ…оӘ¶ "
        foreground_templates:
          - "{{ if gt .Code 0 }}p:red{{ end }}"
        options:
          always_enabled: true
