#:schema https://developers.openai.com/codex/config-schema.json

# Codex CLI configuration — the OpenAI agent, brought to the same guardrails as
# Claude Code (.claude/settings.json) and OpenCode (.config/opencode/opencode.jsonc).
#
# Loaded from $CODEX_HOME/config.toml. CODEX_HOME is set to ~/.config/codex in
# .config/zsh/.zshenv so this whole package lives under XDG config like every
# other tool in this repo (only Claude Code hardcodes ~/.claude).
#
# What mirrors what:
#   sandbox_mode + [sandbox_workspace_write]  <- sandbox.filesystem / sandbox.network
#   approval_policy + rules/default.rules     <- permissions.allow / permissions.deny
#   hooks/pre-tool-use-policy                 <- sandbox.filesystem.denyRead + Bash(security *)
#   [[hooks.*]] -> agent-tmux-status          <- the Claude Code "needs you" tmux indicator
#   [tui]                                      <- theme: custom:cyberdream (inherited via ANSI)
#
# Validate edits with:  codex doctor   (config.toml parse + sandbox summary)

# Prompt before anything that execpolicy hasn't explicitly trusted — the analog
# of Claude Code's "ask unless allow-listed" default (autoAllowBashIfSandboxed=false).
approval_policy = "untrusted"

# ── Sandbox ──────────────────────────────────────────────────────────────────
# workspace-write: read broadly, write only to cwd + writable_roots; everything
# else needs approval. macOS enforces this with Seatbelt, the same primitive
# Claude Code's sandbox uses.
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
# Mirror of sandbox.filesystem.allowWrite. cwd is always writable, so working
# inside ~/Repos/<repo> needs no entry here; these cover writes that land
# outside the current repo (agent worktrees + language/tool caches).
writable_roots = [
  "~/Repos",
  "~/.cache/agent/worktrees",
  "~/.cache/uv",
  "~/.cache/pip",
  "~/.cache/go",
  "~/.local/share/go",
  "~/.npm",
]
# Claude Code allow-lists ~20 network hosts (npm, pypi, github, …). Codex's
# sandbox can only toggle network as a whole, so we enable it to keep installs
# and fetches working. It is broader than Claude Code's allow-list; the
# pre-tool-use-policy hook still blocks credential reads regardless.
network_access = true
# Keep /tmp and $TMPDIR writable (false = included). Matches Claude Code's
# allowWrite of /tmp and the global "$TMPDIR for temp files" convention.
exclude_slash_tmp = false
exclude_tmpdir_env_var = false

# ── Theme ────────────────────────────────────────────────────────────────────
# Codex has no custom hex palette like Claude Code's cyberdream.json — its UI
# chrome renders with the terminal's 16 ANSI colors, which Ghostty already paints
# cyberdream. `theme = "ansi"` makes code-block syntax highlighting follow those
# same ANSI colors too, so the whole TUI stays on-palette without a fork.
[tui]
theme = "ansi"

[tui.model_availability_nux]
"gpt-5.5" = 4

# ── Status hooks: the tmux "needs you" indicator ─────────────────────────────
# Reuse the shared, tool-agnostic ~/.local/share/scripts/agent-tmux-status (also
# driven by Claude Code's hooks and OpenCode's plugin). It sets a per-window
# @agent_status token that .config/tmux/conf/theme.conf renders as a colour +
# glyph. Mapping mirrors .claude/settings.json:
#   Stop             -> waiting    (turn finished, awaiting you)        Claude: Stop
#   PermissionRequest-> attention  (approval needed)                    Claude: Notification
#   PostToolUse      -> clear      (a tool ran after approval)          Claude: PostToolUse
#   UserPromptSubmit -> clear      (you replied)                        Claude: UserPromptSubmit
# Codex has no SessionEnd hook; the four above cover the indicator lifecycle.

[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = "~/.local/share/scripts/agent-tmux-status waiting"

[[hooks.PermissionRequest]]
[[hooks.PermissionRequest.hooks]]
type = "command"
command = "~/.local/share/scripts/agent-tmux-status attention"

[[hooks.PostToolUse]]
[[hooks.PostToolUse.hooks]]
type = "command"
command = "~/.local/share/scripts/agent-tmux-status clear"

[[hooks.UserPromptSubmit]]
[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "~/.local/share/scripts/agent-tmux-status clear"

# ── Credential-read guard ────────────────────────────────────────────────────
# Codex's Seatbelt sandbox grants broad filesystem READ (workspace-write only
# restricts writes), so it has no equivalent of Claude Code's denyRead. Recover
# that protection at the tool layer: a PreToolUse hook inspects every shell
# command and denies any that touch ~/.ssh, ~/.aws, ~/.config/gcloud, ~/.gnupg,
# a .env file, or the macOS `security` keychain tool — the OpenCode bash-deny set.
[[hooks.PreToolUse]]
matcher = "^Bash$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "~/.config/codex/hooks/pre-tool-use-policy"

[hooks.state]

