# use control+space for prefix
unbind C-a
set -g prefix C-a
bind C-a send-prefix

# use better keybinds for windows and always open in current path
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

bind C-p previous-window
bind C-n next-window

# open new windows running coding agents at the repository root
bind C if-shell 'command -v claude >/dev/null 2>&1' {
	new-window -c "#{pane_current_path}" -n '󰯉 claude' "exec claude"
} {
	display-message 'claude not found in PATH'
}
bind O if-shell 'command -v opencode >/dev/null 2>&1' {
	new-window -c "#{pane_current_path}" -n '󰚩 opencode' "exec opencode"
} {
	display-message 'opencode not found in PATH'
}
bind X if-shell 'command -v codex >/dev/null 2>&1' {
	new-window -c "#{pane_current_path}" -n '󱙺 codex' "exec codex"
} {
	display-message 'codex not found in PATH'
}

# resize panes within tmux
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

# use vi keys
set-window-option -g mode-keys vi

# use visual mode / yank for selection
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection

# do not exit copy mode when using mouse to select
unbind -T copy-mode-vi MouseDragEnd1Pane

# kill current session
bind BSpace kill-session
bind f kill-session
